<!DOCTYPE html>
<html>
    <head>
        <title>Wheel of Fortune solver</title>
        <style>
            :root {
                --bg: #081f38;
                --panel: #10345d;
                --open-slot: #f6f7f8;
                --closed-slot: #0ca84a;
                --slot-border: #153555;
                --text: #e7eff9;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                padding: 24px;
                min-height: 100vh;
                background: radial-gradient(circle at top, #1f4f82, var(--bg));
                color: var(--text);
                font-family: Arial, sans-serif;
            }

            .board {
                width: fit-content;
                margin: 0 auto 20px;
                padding: 12px;
                border-radius: 18px;
                background: linear-gradient(180deg, #204c7f, #0f2f51);
                border: 3px solid #3870aa;
                box-shadow: 0 14px 28px rgba(0, 0, 0, 0.35);
                user-select: none;
            }

            .board-row {
                display: flex;
                gap: 5px;
                margin: 4px 0;
            }

            .slot,
            .empty {
                width: 44px;
                height: 54px;
                border-radius: 6px;
            }

            .empty {
                visibility: hidden;
            }

            .slot {
                background: var(--closed-slot);
                border: 2px solid var(--slot-border);
                color: #10284f;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 34px;
                font-weight: 700;
                text-transform: uppercase;
                cursor: pointer;
                transition: transform 0.08s ease, background-color 0.12s ease;
            }

            .slot.open {
                background: var(--open-slot);
            }

            .slot:hover {
                transform: translateY(-1px);
            }

            .button-row {
                max-width: 900px;
                margin: 0 auto;
                display: grid;
                gap: 10px;
                justify-items: center;
            }

            #instructions {
                margin: 0;
                text-align: center;
            }

            #only-button {
                min-width: 140px;
                font-size: 18px;
                font-weight: 700;
                padding: 10px 18px;
                border: none;
                border-radius: 999px;
                color: white;
                background: #ff9700;
                cursor: pointer;
            }

            .letter {
                min-height: 62px;
                font-size: 56px;
                font-weight: 800;
                letter-spacing: 2px;
            }

            .called {
                min-height: 20px;
                font-size: 14px;
                letter-spacing: 1px;
                opacity: 0.9;
            }

            .answers {
                margin: 18px auto 0;
                max-width: 95vw;
                display: flex;
                gap: 10px;
                align-items: flex-start;
                overflow-x: auto;
                padding-bottom: 10px;
            }

            .answer-column {
                max-height: 320px;
                overflow-y: auto;
                background: rgba(6, 26, 47, 0.86);
                border: 2px solid #2a5f95;
                border-radius: 8px;
                padding: 8px;
                flex: 1;
            }

            .answer-column h4 {
                margin: 0 0 6px;
                font-size: 14px;
                color: #9fc7f5;
            }

            .answer-column div {
                font-size: 14px;
                line-height: 1.35;
            }

            .guesses {
                margin: 18px auto 0;
                max-width: 95vw;
            }

            .guesses h3 {
                margin: 0 0 8px;
                font-size: 16px;
                color: #9fc7f5;
                text-align: center;
            }

            .guesses table {
                width: 100%;
                border-collapse: collapse;
                background: rgba(6, 26, 47, 0.86);
                border: 2px solid #2a5f95;
                border-radius: 8px;
                overflow: hidden;
            }

            .guesses th,
            .guesses td {
                padding: 8px 12px;
                text-align: left;
                font-size: 14px;
            }

            .guesses th {
                background: rgba(32, 76, 127, 0.6);
                color: #9fc7f5;
            }

            .guesses tr:nth-child(even) td {
                background: rgba(15, 47, 81, 0.45);
            }

            .guesses td.score {
                text-align: right;
                font-variant-numeric: tabular-nums;
                white-space: nowrap;
            }
        </style>
    </head>
    <body>
        <div class="board">
            <div class="board-row">
                <div class="empty"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="empty"></div>
            </div>
            <div class="board-row">
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>
            <div class="board-row">
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
            </div>
            <div class="board-row">
                <div class="empty"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="slot"></div>
                <div class="empty"></div>
            </div>
        </div>
        <div class="button-row">
            <p id="instructions">Click and drag through slots to toggle white (open) and green (closed). Right-click a closed slot to assign punctuation, then click DONE.</p>
            <button id="only-button">DONE</button>
            <div class="letter"></div>
            <div class="called"></div>
        </div>
        <div class="guesses"></div>
        <div class="answers"></div>
        <script>
            const button = document.getElementById("only-button");
            const instructions = document.getElementById("instructions");
            const board = document.querySelector(".board");
            const slots = Array.from(document.querySelectorAll(".slot"));
            const letterDiv = document.querySelector(".letter");
            const calledDiv = document.querySelector(".called");
            const guessesDiv = document.querySelector(".guesses");
            const answersDiv = document.querySelector(".answers");

            let phase = "setup"; // setup -> locked -> solved
            let dragState = null;
            let dragTouched = new Set();
            let suppressNextClick = false;
            let currentLetter = "";
            let calledLetters = "";

            function setSlotOpen(slot, open) {
                slot.classList.toggle("open", open);
                if (!open) {
                    slot.textContent = "";
                    delete slot.dataset.fixedPunctuation;
                }
            }

            function toggleSlot(slot) {
                const open = !slot.classList.contains("open");
                setSlotOpen(slot, open);
            }

            function setInstructionsForLocked() {
                instructions.textContent =
                    "Board is locked. Type letter keys to set the active letter and add to called letters. Click open slots to place the active letter. Click GO or press Enter to solve.";
            }

            function setInstructionsForSolved() {
                instructions.textContent =
                    "Press letter keys and Enter to run another solve with new called letters. Click START OVER to reset everything.";
            }

            function lockBoard() {
                phase = "locked";
                button.textContent = "GO";
                setInstructionsForLocked();
            }

            function resetAll() {
                phase = "setup";
                dragState = null;
                dragTouched = new Set();
                currentLetter = "";
                calledLetters = "";
                slots.forEach((slot) => {
                    slot.classList.remove("open");
                    slot.textContent = "";
                    delete slot.dataset.fixedPunctuation;
                });
                letterDiv.textContent = "";
                calledDiv.textContent = "";
                guessesDiv.innerHTML = "";
                answersDiv.innerHTML = "";
                button.textContent = "DONE";
                instructions.textContent =
                    "Click and drag through slots to toggle white (open) and green (closed). Right-click a closed slot to assign punctuation, then click DONE.";
            }

            function getBoardRowsText() {
                const rowTexts = Array.from(document.querySelectorAll(".board-row")).map((row) => {
                    return Array.from(row.children)
                        .map((cell) => {
                            if (!cell.classList.contains("slot")) return " ";
                            if (!cell.classList.contains("open")) return " ";
                            const value = (cell.textContent || "").trim().toLowerCase();
                            if (!value) return "_";
                            if (/^[a-z]$/.test(value)) return value;
                            if (value === "'") return value;
                            return value;
                        })
                        .join("");
                });
                return rowTexts;
            }

            function buildFmtString(rows) {
                return rows.join("\n");
            }

            function getFmtWordLabels(fmt) {
                const labels = [];
                let cur = "";
                for (let i = 0; i < fmt.length; i++) {
                    const c = fmt[i];
                    const isWordChar = (c >= "a" && c <= "z") || c === "_" || c === "'";
                    if (isWordChar) {
                        cur += c;
                    } else {
                        if (cur) {
                            const first = cur[0];
                            if ((first >= "a" && first <= "z") || first === "_" || first === "'") {
                                labels.push(cur);
                            }
                            cur = "";
                        }
                    }
                }
                if (cur) {
                    const first = cur[0];
                    if ((first >= "a" && first <= "z") || first === "_" || first === "'") {
                        labels.push(cur);
                    }
                }
                return labels;
            }

            function renderGuesses(out) {
                guessesDiv.innerHTML = "";
                if (!Array.isArray(out) || !out.length) return;

                const heading = document.createElement("h3");
                heading.textContent = "Most likely phrases";
                guessesDiv.appendChild(heading);

                const table = document.createElement("table");
                table.innerHTML = "<thead><tr><th>Phrase</th><th>Score</th></tr></thead>";
                const tbody = document.createElement("tbody");

                out.forEach((item) => {
                    const tr = document.createElement("tr");
                    const textCell = document.createElement("td");
                    const scoreCell = document.createElement("td");
                    textCell.textContent = item && item.text != null ? String(item.text) : "";
                    scoreCell.className = "score";
                    scoreCell.textContent = item && item.score != null ? String(item.score) : "";
                    tr.appendChild(textCell);
                    tr.appendChild(scoreCell);
                    tbody.appendChild(tr);
                });

                table.appendChild(tbody);
                guessesDiv.appendChild(table);
            }

            function renderAllColumns(all, labels) {
                answersDiv.innerHTML = "";
                if (!Array.isArray(all) || !all.length) {
                    const emptyColumn = document.createElement("div");
                    emptyColumn.className = "answer-column";
                    emptyColumn.innerHTML = "<h4>No results</h4><div>(no poss results)</div>";
                    answersDiv.appendChild(emptyColumn);
                    return;
                }

                all.forEach((poss, index) => {
                    const label = labels[index] || `Word ${index + 1}`;
                    const col = document.createElement("div");
                    col.className = "answer-column";
                    col.innerHTML = `<h4>${label}</h4>`;

                    if (!Array.isArray(poss) || !poss.length) {
                        const row = document.createElement("div");
                        row.textContent = "(no poss results)";
                        col.appendChild(row);
                    } else {
                        poss.forEach((item) => {
                            const row = document.createElement("div");
                            row.textContent = typeof item === "string" ? item : JSON.stringify(item);
                            col.appendChild(row);
                        });
                    }

                    answersDiv.appendChild(col);
                });
            }

            async function solveBoard(triggeredByClick) {
                const rows = getBoardRowsText();
                const fmt = buildFmtString(rows);
                guessesDiv.innerHTML = "";
                answersDiv.innerHTML = "<div class='answer-column'><h4>...</h4><div>Loading...</div></div>";

                if (!fmt.trim() || !/[a-z_]/.test(fmt)) {
                    guessesDiv.innerHTML = "";
                    answersDiv.innerHTML = "";
                    const emptyColumn = document.createElement("div");
                    emptyColumn.className = "answer-column";
                    emptyColumn.innerHTML = "<h4>No puzzle text</h4><div>Open some slots first.</div>";
                    answersDiv.appendChild(emptyColumn);
                    return;
                }

                try {
                    const response = await fetch("https://rummy.nationalrecordingregistry.net/wheel/", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            fmt,
                            cld: calledLetters.toLowerCase()
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const payload = await response.json();
                    renderGuesses(payload.out);
                    renderAllColumns(payload.all, getFmtWordLabels(fmt));
                } catch (error) {
                    guessesDiv.innerHTML = "";
                    answersDiv.innerHTML = "";
                    const errorColumn = document.createElement("div");
                    errorColumn.className = "answer-column";
                    errorColumn.innerHTML = `<h4>Error</h4><div>${error.message}</div>`;
                    answersDiv.appendChild(errorColumn);
                }

                if (triggeredByClick && button.textContent === "GO") {
                    phase = "solved";
                    button.textContent = "START OVER";
                    setInstructionsForSolved();
                }
            }

            board.addEventListener("mousedown", (event) => {
                const slot = event.target.closest(".slot");
                if (!slot || phase !== "setup") return;
                event.preventDefault();
                dragState = !slot.classList.contains("open");
                dragTouched = new Set([slot]);
                setSlotOpen(slot, dragState);
                suppressNextClick = true;
            });

            board.addEventListener("mouseover", (event) => {
                if (dragState === null || phase !== "setup") return;
                const slot = event.target.closest(".slot");
                if (!slot || dragTouched.has(slot)) return;
                dragTouched.add(slot);
                setSlotOpen(slot, dragState);
            });

            document.addEventListener("mouseup", () => {
                dragState = null;
                dragTouched = new Set();
            });

            board.addEventListener("click", (event) => {
                const slot = event.target.closest(".slot");
                if (!slot) return;

                if (phase === "setup" && dragState === null) {
                    if (suppressNextClick) {
                        suppressNextClick = false;
                        return;
                    }
                    toggleSlot(slot);
                    return;
                }

                if ((phase === "locked" || phase === "solved") && slot.classList.contains("open") && currentLetter) {
                    if (slot.dataset.fixedPunctuation === "true") return;
                    slot.textContent = currentLetter;
                }
            });

            board.addEventListener("contextmenu", (event) => {
                const slot = event.target.closest(".slot");
                if (!slot || phase !== "setup" || !slot.classList.contains("open")) return;
                event.preventDefault();

                const raw = window.prompt("Punctuation for this slot (single character). Leave blank to clear.", slot.textContent || "");
                if (raw === null) return;

                const value = raw.trim();
                if (!value) {
                    slot.textContent = "";
                    delete slot.dataset.fixedPunctuation;
                    return;
                }

                const char = value[0];
                if (/^[a-zA-Z0-9\s]$/.test(char)) return;
                slot.textContent = char;
                slot.dataset.fixedPunctuation = "true";
            });

            button.addEventListener("click", async () => {
                if (phase === "setup") {
                    lockBoard();
                } else if (button.textContent === "GO") {
                    await solveBoard(true);
                } else {
                    resetAll();
                }
            });

            document.addEventListener("keydown", async (event) => {
                if (event.key === "Enter") {
                    if (phase === "setup") {
                        lockBoard();
                    } else if (phase === "locked" || phase === "solved") {
                        await solveBoard(false);
                    }
                    return;
                }

                if (phase !== "locked" && phase !== "solved") return;
                if (!/^[a-zA-Z]$/.test(event.key)) return;

                currentLetter = event.key.toUpperCase();
                letterDiv.textContent = currentLetter;
                calledLetters += event.key.toLowerCase();
                calledDiv.textContent = calledLetters.toUpperCase();
            });
        </script>
    </body>
</html>
